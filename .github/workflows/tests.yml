name: Playwright Tests — Automation Anywhere CE

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js ───────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── Install Playwright browsers ───────────────────────────────────────
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # ── Run all tests ─────────────────────────────────────────────────────
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL:     ${{ secrets.BASE_URL }}
          AA_USERNAME:  ${{ secrets.AA_USERNAME }}
          AA_PASSWORD:  ${{ secrets.AA_PASSWORD }}

      # ── Upload HTML report as artifact ────────────────────────────────────
      - name: Upload Playwright HTML report
        if: always()   # Upload even on test failure
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      # ── Upload test result traces on failure ──────────────────────────────
      - name: Upload test results (traces/screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
